<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submission Detail - WebTestPortal</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/css/site.css">
  <style>
    /* ── Score ring (mirrors student/result.html) ──────────────── */
    .result-hero { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-xl); box-shadow: var(--shadow-sm); overflow: hidden; }
    .result-hero-top { padding: 2.5rem 2rem 2rem; text-align: center; position: relative; }
    .result-hero-top::before { content: ""; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 0%, rgba(99,102,241,.07) 0%, transparent 70%); pointer-events: none; }

    .score-ring-wrap { position: relative; display: inline-flex; align-items: center; justify-content: center; width: 160px; height: 160px; margin-bottom: 1.25rem; }
    .score-ring-svg { position: absolute; inset: 0; width: 100%; height: 100%; transform: rotate(-90deg); }
    .score-ring-track { fill: none; stroke: var(--slate-100); stroke-width: 10; }
    .score-ring-fill  { fill: none; stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 1.1s cubic-bezier(0.4, 0, 0.2, 1); }
    .score-ring-inner { display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1; }
    .score-ring-pct   { font-size: 2rem; font-weight: 800; line-height: 1; letter-spacing: -0.03em; }
    .score-ring-label { font-size: 0.7rem; font-weight: 600; color: var(--slate-400); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }

    .result-title { font-size: 1.35rem; font-weight: 700; color: var(--slate-800); margin-bottom: 0.2rem; }
    .result-subtitle { font-size: 0.85rem; color: var(--slate-500); }
    .result-pass-chip { display: inline-flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; font-weight: 700; padding: 0.3rem 0.85rem; border-radius: 20px; margin-top: 0.75rem; }

    .result-stats-strip { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); border-top: 1px solid var(--border); }
    .result-stat-cell { padding: 1.1rem 0.75rem; text-align: center; border-right: 1px solid var(--border); }
    .result-stat-cell:last-child { border-right: none; }
    .result-stat-value { font-size: 1.4rem; font-weight: 800; line-height: 1; }
    .result-stat-label { font-size: 0.7rem; font-weight: 600; color: var(--slate-400); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 4px; }
    .result-stat-icon  { font-size: 1rem; display: block; margin-bottom: 4px; }

    .result-filter-tabs { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .result-filter-btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      font-size: 0.8rem; font-weight: 600; padding: 0.4rem 0.9rem;
      border-radius: 20px; border: 1.5px solid var(--border);
      background: var(--white); color: var(--slate-600);
      cursor: pointer; transition: all 0.15s ease; white-space: nowrap;
    }
    .result-filter-btn:hover { border-color: var(--brand-400); color: var(--brand-500); background: var(--indigo-50); }
    .result-filter-btn.active { background: var(--brand-500); border-color: var(--brand-500); color: #fff; }
    .result-filter-btn .rfb-count { background: rgba(255,255,255,0.25); border-radius: 10px; padding: 0 0.4rem; font-size: 0.72rem; }
    .result-filter-btn:not(.active) .rfb-count { background: var(--slate-100); color: var(--slate-500); }

    .result-q-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius-lg); box-shadow: var(--shadow-sm);
      overflow: hidden; transition: box-shadow 0.2s ease;
    }
    .result-q-card:hover { box-shadow: var(--shadow-md); }
    .result-q-card.is-correct  { border-left: 4px solid #34d399; }
    .result-q-card.is-incorrect{ border-left: 4px solid #fb7185; }

    .rq-header {
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap;
      gap: 0.5rem; padding: 1.1rem 1.4rem;
      border-bottom: 1px solid var(--border);
      background: var(--slate-50);
    }
    .rq-body { padding: 1.5rem; }
    .rq-text { font-size: 1.05rem; font-weight: 600; color: var(--slate-800); line-height: 1.6; margin-bottom: 1.2rem; }

    .result-option-row {
      display: flex; align-items: flex-start; gap: 0.75rem;
      padding: 0.85rem 1rem; border-radius: var(--radius); border: 1.5px solid var(--border);
      margin-bottom: 0.5rem; background: var(--slate-50); font-size: 0.88rem;
      transition: background 0.15s ease, border-color 0.15s ease;
    }
    .result-option-row.is-correct-selected  { background: #ecfdf5; border-color: #6ee7b7; color: var(--emerald-800); font-weight: 500; }
    .result-option-row.is-wrong-selected    { background: #fff1f2; border-color: #fda4af; color: var(--rose-800);    font-weight: 500; }
    .result-option-row.is-correct-missed    { background: #f0fdf4; border-color: #86efac; border-style: dashed; }
    .result-option-row .ro-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
    .result-option-row .ro-letter { font-weight: 700; color: var(--slate-500); flex-shrink: 0; }
    .result-option-row.is-correct-selected .ro-letter { color: var(--emerald-700); }
    .result-option-row.is-wrong-selected .ro-letter   { color: var(--rose-700); }
    .result-option-row .ro-text { flex: 1; line-height: 1.5; }
    .result-option-row .ro-badge { font-size: 0.68rem; font-weight: 700; padding: 0.15rem 0.5rem; border-radius: 10px; white-space: nowrap; flex-shrink: 0; }
    .ro-badge.your-ans  { background: var(--indigo-50); color: var(--brand-600); border: 1px solid var(--brand-200); }
    .ro-badge.correct-ans { background: #ecfdf5; color: var(--emerald-700); border: 1px solid #6ee7b7; }

    .rq-score-row { display: flex; align-items: center; justify-content: space-between; padding-top: 0.85rem; margin-top: 0.85rem; border-top: 1px solid var(--border); }
    .rq-score-earned { font-size: 1.05rem; font-weight: 700; }
    .explanation-box { background: var(--indigo-50); border: 1px solid var(--brand-200); border-radius: var(--radius); padding: 0.75rem 1rem; margin-top: 0.85rem; font-size: 0.85rem; color: var(--brand-700); }

    @media print {
      .no-print, .topbar, .sidebar, .sidebar-backdrop, .app-footer { display: none !important; }
      .main-wrapper { margin-left: 0 !important; }
      .result-q-card { page-break-inside: avoid; }
    }
    @media (max-width: 575px) {
      .result-stats-strip { grid-template-columns: repeat(3, 1fr); }
      .result-stat-cell:nth-child(3) { border-right: none; }
      .result-stat-cell:nth-child(4),
      .result-stat-cell:nth-child(5) { border-top: 1px solid var(--border); }
    }
  </style>
</head>
<body data-active-page="admin-results" data-require-role="Admin">
  <div class="shell">
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <a href="/student/dashboard.html" class="sidebar-brand">
          <span class="sidebar-brand-icon"><i class="bi bi-mortarboard-fill"></i></span>
          <span class="sidebar-brand-text">WebTestPortal</span>
        </a>
        <button class="sidebar-close d-lg-none" id="sidebarClose" aria-label="Close sidebar"><i class="bi bi-x-lg"></i></button>
      </div>

      <nav class="sidebar-nav">
        <a href="/admin/dashboard.html" data-page="admin-dashboard" data-role="Admin" class="text-decoration-none"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a href="/admin/tests.html" data-page="admin-tests" data-role="Admin" class="text-decoration-none"><i class="bi bi-journal-richtext"></i> Tests</a>
        <a href="/admin/users.html" data-page="admin-users" data-role="Admin" class="text-decoration-none"><i class="bi bi-people"></i> Users</a>
        <a href="/admin/results.html" data-page="admin-results" data-role="Admin" class="text-decoration-none"><i class="bi bi-bar-chart"></i> Results</a>
      </nav>

      <div class="sidebar-divider"></div>

      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-avatar js-user-avatar">U</div>
          <div class="sidebar-user-info">
            <div class="sidebar-user-name js-user-name">&nbsp;</div>
            <div class="sidebar-user-role js-user-role"></div>
          </div>
        </div>
        <div class="sidebar-actions">
          <a href="/profile.html" class="btn btn-ghost btn-sm w-100"><i class="bi bi-person-gear"></i> Profile</a>
          <button type="button" class="btn btn-ghost btn-sm w-100 text-rose-500 js-logout-btn"><i class="bi bi-box-arrow-right"></i> Sign Out</button>
        </div>
      </div>
    </aside>

    <div class="main-wrapper">
      <div class="topbar">
        <button class="topbar-toggle" id="sidebarToggle" aria-label="Toggle sidebar"><i class="bi bi-list"></i></button>
        <span class="topbar-brand">WebTestPortal</span>
        <div class="topbar-user">
          <div class="sidebar-avatar js-user-avatar" style="width:32px;height:32px;font-size:0.75rem;">U</div>
        </div>
      </div>
      <main class="main" id="mainContent">

        <div class="fade-in-el" style="max-width:1080px;margin:0 auto;">

          <div class="d-flex align-items-start justify-content-between flex-wrap gap-3 mb-4 no-print">
            <div>
              <a href="/admin/results.html" class="btn btn-sm btn-ghost mb-1"><i class="bi bi-arrow-left me-1"></i>Back to Results</a>
              <h1 class="page-title mb-0">Submission Detail</h1>
              <p class="page-subtitle mb-0" id="sdSubtitle"></p>
            </div>
            <button type="button" class="btn btn-outline-secondary btn-sm" id="btnPrint"><i class="bi bi-printer me-1"></i>Print</button>
          </div>

          <div class="alert alert-danger d-none" id="alertBox"></div>

          <!-- Hero score card -->
          <div class="result-hero mb-4">
            <div class="result-hero-top">
              <div class="score-ring-wrap">
                <svg class="score-ring-svg" viewBox="0 0 160 160">
                  <circle class="score-ring-track" cx="80" cy="80" r="70"/>
                  <circle class="score-ring-fill" id="scoreRingFill" cx="80" cy="80" r="70"
                          stroke-dasharray="439.82" stroke-dashoffset="439.82"/>
                </svg>
                <div class="score-ring-inner">
                  <span class="score-ring-pct" id="sdPercentage">0%</span>
                  <span class="score-ring-label">Score</span>
                </div>
              </div>
              <div class="result-title" id="sdUserName">—</div>
              <div class="result-subtitle" id="sdCompletedAt"></div>
              <div><span class="result-pass-chip" id="sdPassChip"></span></div>
            </div>

            <div class="result-stats-strip">
              <div class="result-stat-cell">
                <i class="bi bi-check-circle-fill result-stat-icon text-emerald-500"></i>
                <div class="result-stat-value text-emerald-600" id="statCorrect">—</div>
                <div class="result-stat-label">Correct</div>
              </div>
              <div class="result-stat-cell">
                <i class="bi bi-x-circle-fill result-stat-icon text-rose-500"></i>
                <div class="result-stat-value text-rose-500" id="statIncorrect">—</div>
                <div class="result-stat-label">Incorrect</div>
              </div>
              <div class="result-stat-cell">
                <i class="bi bi-dash-circle result-stat-icon text-secondary"></i>
                <div class="result-stat-value text-secondary" id="statSkipped">—</div>
                <div class="result-stat-label">Skipped</div>
              </div>
              <div class="result-stat-cell">
                <i class="bi bi-star-fill result-stat-icon" style="color:var(--brand-500)"></i>
                <div class="result-stat-value" style="color:var(--brand-600)" id="sdScore">—</div>
                <div class="result-stat-label">Points</div>
              </div>
              <div class="result-stat-cell">
                <i class="bi bi-stopwatch result-stat-icon text-secondary"></i>
                <div class="result-stat-value text-secondary" id="sdDuration">—</div>
                <div class="result-stat-label">Duration</div>
              </div>
            </div>
          </div>

          <!-- Question review -->
          <div class="d-flex align-items-center justify-content-between flex-wrap gap-3 mb-3">
            <h5 class="fw-bold mb-0"><i class="bi bi-list-check me-2 text-brand"></i>Question Review</h5>
            <div class="result-filter-tabs no-print" id="filterTabs">
              <button class="result-filter-btn active" data-filter="all">All <span class="rfb-count" id="fc-all">0</span></button>
              <button class="result-filter-btn" data-filter="correct"><i class="bi bi-check-circle-fill" style="color:#34d399"></i> Correct <span class="rfb-count" id="fc-correct">0</span></button>
              <button class="result-filter-btn" data-filter="incorrect"><i class="bi bi-x-circle-fill" style="color:#fb7185"></i> Incorrect <span class="rfb-count" id="fc-incorrect">0</span></button>
              <button class="result-filter-btn" data-filter="skipped"><i class="bi bi-dash-circle" style="color:var(--slate-400)"></i> Skipped <span class="rfb-count" id="fc-skipped">0</span></button>
            </div>
          </div>
          <div id="questionsReviewContainer" class="d-flex flex-column gap-3"></div>
        </div>

      </main>
      <footer class="app-footer d-none d-sm-block">
        <div class="container-fluid">
          <div class="row align-items-center justify-content-between">
            <div class="col-12 col-md-6 text-center text-md-start mb-1 mb-md-0">&copy; 2026 WebTestPortal. All rights reserved.</div>
          </div>
        </div>
      </footer>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/search.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/admin-results.js"></script>
  <div class="toast-container" id="toastContainer"></div>
</body>
</html>
