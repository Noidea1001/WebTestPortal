<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Test - WebTestPortal</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/css/site.css">
  
</head>
<body data-active-page="admin-tests" data-require-role="Admin">
  <div class="shell">
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <a href="/student/dashboard.html" class="sidebar-brand">
          <span class="sidebar-brand-icon"><i class="bi bi-mortarboard-fill"></i></span>
          <span class="sidebar-brand-text">WebTestPortal</span>
        </a>
        <button class="sidebar-close d-lg-none" id="sidebarClose" aria-label="Close sidebar"><i class="bi bi-x-lg"></i></button>
      </div>

      <nav class="sidebar-nav">
        <a href="/admin/dashboard.html" data-page="admin-dashboard" data-role="Admin" class="text-decoration-none"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a href="/admin/tests.html" data-page="admin-tests" data-role="Admin" class="text-decoration-none"><i class="bi bi-journal-richtext"></i> Tests</a>
        <a href="/admin/users.html" data-page="admin-users" data-role="Admin" class="text-decoration-none"><i class="bi bi-people"></i> Users</a>
        <a href="/admin/results.html" data-page="admin-results" data-role="Admin" class="text-decoration-none"><i class="bi bi-bar-chart"></i> Results</a>
      </nav>

      <div class="sidebar-divider"></div>

      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-avatar js-user-avatar">U</div>
          <div class="sidebar-user-info">
            <div class="sidebar-user-name js-user-name">&nbsp;</div>
            <div class="sidebar-user-role js-user-role"></div>
          </div>
        </div>
        <div class="sidebar-actions">
          <a href="/profile.html" class="btn btn-ghost btn-sm w-100"><i class="bi bi-person-gear"></i> Profile</a>
          <button type="button" class="btn btn-ghost btn-sm w-100 text-rose-500 js-logout-btn"><i class="bi bi-box-arrow-right"></i> Sign Out</button>
        </div>
      </div>
    </aside>

    <div class="main-wrapper">
      <div class="topbar">
        <button class="topbar-toggle" id="sidebarToggle" aria-label="Toggle sidebar"><i class="bi bi-list"></i></button>
        <span class="topbar-brand">WebTestPortal</span>
        <div class="topbar-user">
          <div class="sidebar-avatar js-user-avatar" style="width:32px;height:32px;font-size:0.75rem;">U</div>
        </div>
      </div>
      <main class="main" id="mainContent">

        <div class="fade-in-el">
          <div class="page-header">
            <h1 class="page-title">Create New Test</h1>
            <p class="page-subtitle">Start a new test draft; you'll be redirected to the question editor after creation.</p>
          </div>
          <div class="alert alert-danger d-none" id="alertBox"></div>

          <div class="card glass-panel p-4 mb-4">
            <form id="createTestForm">
              <div class="floating-group mb-3">
                <input id="ctTitle" class="form-control" placeholder="Test Title" required>
                <label for="ctTitle">Test Title</label>
              </div>

              <div class="mb-3">
                <label class="form-label" for="ctDescription">Description</label>
                <textarea id="ctDescription" class="form-control" rows="4" placeholder="Describe the test objectives..."></textarea>
              </div>

              <div class="floating-group mb-3">
                <input id="ctMaxAttempts" class="form-control" placeholder="Max Attempts" type="number" min="1" max="999" value="1" required>
                <label for="ctMaxAttempts">Max Attempts</label>
              </div>

              <div class="floating-group mb-3">
                <input id="ctTimeLimit" class="form-control" placeholder="Time Limit" type="number" min="0" max="10080">
                <label for="ctTimeLimit">Time Limit Minutes</label>
                <div class="form-text small">Leave blank or enter 0 for unlimited time.</div>
              </div>

              <div class="mb-3 pt-2 border-top">
                <p class="fw-medium text-secondary small mb-2 mt-2">Exam behaviour</p>
                <div class="form-check mb-2">
                  <input id="ctShuffleQuestions" class="form-check-input" type="checkbox" checked>
                  <label class="form-check-label" for="ctShuffleQuestions">Shuffle question order per student</label>
                </div>
                <div class="form-check">
                  <input id="ctShuffleOptions" class="form-check-input" type="checkbox" checked>
                  <label class="form-check-label" for="ctShuffleOptions">Shuffle answer options per student</label>
                </div>
              </div>

              <div class="d-flex gap-2">
                <button type="submit" class="btn btn-brand"><span class="btn-text">Create &amp; Edit Questions</span></button>
                <a href="/admin/tests.html" class="btn btn-outline-secondary">Cancel</a>
              </div>
            </form>
          </div>
        </div>

      </main>
      <footer class="app-footer d-none d-sm-block">
        <div class="container-fluid">
          <div class="row align-items-center justify-content-between">
            <div class="col-12 col-md-6 text-center text-md-start mb-1 mb-md-0">&copy; 2026 WebTestPortal. All rights reserved.</div>
          </div>
        </div>
      </footer>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/search.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/add-test.js"></script>
  <div class="toast-container" id="toastContainer"></div>
</body>
</html>
