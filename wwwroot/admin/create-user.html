<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create User - WebTestPortal</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/css/site.css">
  
</head>
<body data-active-page="admin-users" data-require-role="Admin">
  <div class="shell">
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <a href="/student/dashboard.html" class="sidebar-brand">
          <span class="sidebar-brand-icon"><i class="bi bi-mortarboard-fill"></i></span>
          <span class="sidebar-brand-text">WebTestPortal</span>
        </a>
        <button class="sidebar-close d-lg-none" id="sidebarClose" aria-label="Close sidebar"><i class="bi bi-x-lg"></i></button>
      </div>

      <nav class="sidebar-nav">
        <a href="/admin/dashboard.html" data-page="admin-dashboard" data-role="Admin" class="text-decoration-none"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a href="/admin/tests.html" data-page="admin-tests" data-role="Admin" class="text-decoration-none"><i class="bi bi-journal-richtext"></i> Tests</a>
        <a href="/admin/users.html" data-page="admin-users" data-role="Admin" class="text-decoration-none"><i class="bi bi-people"></i> Users</a>
        <a href="/admin/results.html" data-page="admin-results" data-role="Admin" class="text-decoration-none"><i class="bi bi-bar-chart"></i> Results</a>
      </nav>

      <div class="sidebar-divider"></div>

      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-avatar js-user-avatar">U</div>
          <div class="sidebar-user-info">
            <div class="sidebar-user-name js-user-name">&nbsp;</div>
            <div class="sidebar-user-role js-user-role"></div>
          </div>
        </div>
        <div class="sidebar-actions">
          <a href="/profile.html" class="btn btn-ghost btn-sm w-100"><i class="bi bi-person-gear"></i> Profile</a>
          <button type="button" class="btn btn-ghost btn-sm w-100 text-rose-500 js-logout-btn"><i class="bi bi-box-arrow-right"></i> Sign Out</button>
        </div>
      </div>
    </aside>

    <div class="main-wrapper">
      <div class="topbar">
        <button class="topbar-toggle" id="sidebarToggle" aria-label="Toggle sidebar"><i class="bi bi-list"></i></button>
        <span class="topbar-brand">WebTestPortal</span>
        <div class="topbar-user">
          <div class="sidebar-avatar js-user-avatar" style="width:32px;height:32px;font-size:0.75rem;">U</div>
        </div>
      </div>
      <main class="main" id="mainContent">

        <div class="fade-in-el">
          <div class="page-header">
            <a href="/admin/users.html" class="btn btn-sm btn-ghost mb-1"><i class="bi bi-arrow-left me-1"></i>Back to Users</a>
            <h1 class="page-title">Create New User</h1>
            <p class="page-subtitle">Add a new user account. Password will be set now.</p>
          </div>
          <div class="alert alert-danger d-none" id="alertBox"></div>
          <div class="card glass-panel p-4 mb-4">
            <form id="createUserForm">
              <div class="floating-group mb-3"><input id="cuUsername" class="form-control" placeholder="Username" required minlength="3" maxlength="64"><label for="cuUsername">Username</label></div>
              <div class="floating-group mb-3"><input id="cuEmail" type="email" class="form-control" placeholder="Email" required maxlength="256"><label for="cuEmail">Email</label></div>
              <div class="floating-group mb-3"><input id="cuFullName" class="form-control" placeholder="Full Name" required><label for="cuFullName">Full Name</label></div>
              <div class="floating-group mb-3 position-relative">
                <input id="cuPassword" type="password" class="form-control" placeholder="Password" required minlength="6" autocomplete="new-password">
                <label for="cuPassword">Password</label>
                <button type="button" class="password-toggle" tabindex="-1" aria-label="Toggle password visibility"><i class="bi bi-eye"></i></button>
              </div>
              <div class="mb-3"><label class="form-label" for="cuRole">Role</label>
                <select id="cuRole" class="form-select"><option value="Student">Student</option><option value="Admin">Admin</option></select>
              </div>
              <div class="d-flex gap-2">
                <button type="submit" class="btn btn-brand">Create User</button>
                <a href="/admin/users.html" class="btn btn-outline-secondary">Cancel</a>
              </div>
            </form>
          </div>
        </div>

      </main>
      <footer class="app-footer d-none d-sm-block">
        <div class="container-fluid">
          <div class="row align-items-center justify-content-between">
            <div class="col-12 col-md-6 text-center text-md-start mb-1 mb-md-0">&copy; 2026 WebTestPortal. All rights reserved.</div>
          </div>
        </div>
      </footer>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/search.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/admin-users.js"></script>
  <div class="toast-container" id="toastContainer"></div>
</body>
</html>
