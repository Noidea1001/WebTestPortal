<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Users - WebTestPortal</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/css/site.css">
    <style>
  .users-search-wrap { position:relative; }
  .users-search-icon { position:absolute; left:.75rem; top:50%; transform:translateY(-50%); color:var(--slate-400); font-size:.82rem; pointer-events:none; }
  .users-search-input { padding:.42rem .85rem .42rem 2.2rem; border:1px solid var(--border); border-radius:var(--radius-sm); font-size:.83rem; width:240px; }
  .users-filter-select { padding:.42rem .75rem; border:1px solid var(--border); border-radius:var(--radius-sm); font-size:.83rem; }
  .users-panel { background:var(--white); border:1px solid var(--border); border-radius:16px; overflow:hidden; box-shadow:var(--shadow-sm); }
  .users-panel-header { display:flex; align-items:center; justify-content:space-between; padding:1.1rem 1.4rem; border-bottom:1px solid var(--border); background:linear-gradient(135deg,#f8fafc,#f1f5f9); flex-wrap:wrap; gap:.75rem; }
  .users-table { width:100%; font-size:.875rem; }
  .users-table thead th { padding:.75rem 1rem; font-size:.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--slate-500); border-bottom:1px solid var(--border); white-space:nowrap; }
  .users-table tbody td { padding:.82rem 1rem; vertical-align:middle; border-bottom:1px solid #f1f5f9; }
  .user-avatar-cell { display:flex; align-items:center; gap:.75rem; }
  .user-avatar-mini { width:34px; height:34px; border-radius:50%; background:linear-gradient(135deg, var(--brand-500), var(--brand-700)); color:#fff; display:flex; align-items:center; justify-content:center; font-size:.8rem; font-weight:700; flex-shrink:0; }
  .user-role-badge { display:inline-flex; align-items:center; gap:.25rem; padding:.18rem .55rem; border-radius:999px; font-size:.68rem; font-weight:700; text-transform:uppercase; }
  .user-role-badge.admin { background:var(--brand-100); color:var(--brand-700); }
  .user-role-badge.student { background:var(--slate-100); color:var(--slate-600); }
  .users-loading, .users-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:4rem 1rem; text-align:center; gap:.5rem; color:var(--slate-400); }
  </style>

</head>
<body data-active-page="admin-users" data-require-role="Admin">
  <div class="shell">
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <a href="/student/dashboard.html" class="sidebar-brand">
          <span class="sidebar-brand-icon"><i class="bi bi-mortarboard-fill"></i></span>
          <span class="sidebar-brand-text">WebTestPortal</span>
        </a>
        <button class="sidebar-close d-lg-none" id="sidebarClose" aria-label="Close sidebar"><i class="bi bi-x-lg"></i></button>
      </div>
      <nav class="sidebar-nav">
        <a href="/admin/dashboard.html" data-page="admin-dashboard" data-role="Admin" class="text-decoration-none"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a href="/admin/tests.html" data-page="admin-tests" data-role="Admin" class="text-decoration-none"><i class="bi bi-journal-richtext"></i> Tests</a>
        <a href="/admin/users.html" data-page="admin-users" data-role="Admin" class="text-decoration-none"><i class="bi bi-people"></i> Users</a>
        <a href="/admin/results.html" data-page="admin-results" data-role="Admin" class="text-decoration-none"><i class="bi bi-bar-chart"></i> Results</a>
      </nav>

      <div class="sidebar-divider"></div>

      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-avatar js-user-avatar">U</div>
          <div class="sidebar-user-info">
            <div class="sidebar-user-name js-user-name">&nbsp;</div>
            <div class="sidebar-user-role js-user-role"></div>
          </div>
        </div>
        <div class="sidebar-actions">
          <a href="/profile.html" class="btn btn-ghost btn-sm w-100"><i class="bi bi-person-gear"></i> Profile</a>
          <button type="button" class="btn btn-ghost btn-sm w-100 text-rose-500 js-logout-btn"><i class="bi bi-box-arrow-right"></i> Sign Out</button>
        </div>
      </div>
    </aside>

    <div class="main-wrapper">
      <div class="topbar">
        <button class="topbar-toggle" id="sidebarToggle" aria-label="Toggle sidebar"><i class="bi bi-list"></i></button>
        <span class="topbar-brand">WebTestPortal</span>
        <div class="topbar-user">
          <div class="sidebar-avatar js-user-avatar" style="width:32px;height:32px;font-size:0.75rem;">U</div>
        </div>
      </div>
      <main class="main" id="mainContent">

        <div class="fade-in-el">
          <div class="d-flex align-items-end justify-content-between flex-wrap gap-3 mb-4">
            <div><h1 class="page-title">Registered Users</h1><p class="page-subtitle">Manage student and admin accounts.</p></div>
            <a href="/admin/create-user.html" class="btn btn-brand"><i class="bi bi-person-plus-fill me-1"></i> Add User</a>
          </div>
          <div class="alert alert-danger d-none" id="alertBox"></div>

          <div class="users-panel">
            <div class="users-panel-header">
              <h5 class="mb-0"><i class="bi bi-people-fill text-brand"></i> All Users</h5>
              <div class="d-flex align-items-center gap-2 flex-wrap">
                <div class="users-search-wrap">
                  <i class="bi bi-search users-search-icon"></i>
                  <input type="text" id="usersSearchInput" class="users-search-input" placeholder="Search users...">
                </div>
                <select id="usersRoleFilter" class="users-filter-select">
                  <option value="">All roles</option>
                  <option value="Admin">Admin</option>
                  <option value="Student">Student</option>
                </select>
              </div>
            </div>

            <div id="loadingState" class="users-loading"><i class="bi bi-arrow-repeat"></i><span>Loading users&hellip;</span></div>
            <div id="emptyUsers" class="users-empty d-none"><i class="bi bi-people fs-2"></i><strong>No Users Found</strong></div>

            <div class="table-responsive d-none" id="usersTableWrapper">
              <table class="users-table" id="usersTable">
                <thead><tr><th>User</th><th>Email</th><th>Full Name</th><th>Role</th><th>Joined</th><th class="text-end" style="padding-right:1.4rem;">Actions</th></tr></thead>
                <tbody id="usersTableBody"></tbody>
              </table>
            </div>
          </div>
        </div>

      </main>
      <footer class="app-footer d-none d-sm-block">
        <div class="container-fluid">
          <div class="row align-items-center justify-content-between">
            <div class="col-12 col-md-6 text-center text-md-start mb-1 mb-md-0">&copy; 2026 WebTestPortal. All rights reserved.</div>
          </div>
        </div>
      </footer>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/search.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/admin-users.js"></script>
  <script>
  document.addEventListener("shell:ready", function () {
    function applyFilter() {
      var query = (document.getElementById('usersSearchInput')?.value || '').trim().toLowerCase();
      var role  = (document.getElementById('usersRoleFilter')?.value || '');
      document.querySelectorAll('#usersTable .filter-row').forEach(function (row) {
        var text = (row.querySelector('.filter-text')?.textContent || '').toLowerCase();
        var rowRole = row.dataset.role || '';
        var show = (!query || text.includes(query)) && (!role || rowRole === role);
        row.classList.toggle('d-none', !show);
      });
    }
    document.getElementById('usersSearchInput')?.addEventListener('input', applyFilter);
    document.getElementById('usersRoleFilter')?.addEventListener('change', applyFilter);
  });
  </script>

  <div class="toast-container" id="toastContainer"></div>
</body>
</html>
