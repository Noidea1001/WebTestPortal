<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - WebTestPortal</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/css/site.css">
  
</head>
<body data-active-page="profile" data-require-role="">
  <div class="shell">
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <a href="/student/dashboard.html" class="sidebar-brand">
          <span class="sidebar-brand-icon"><i class="bi bi-mortarboard-fill"></i></span>
          <span class="sidebar-brand-text">WebTestPortal</span>
        </a>
        <button class="sidebar-close d-lg-none" id="sidebarClose" aria-label="Close sidebar"><i class="bi bi-x-lg"></i></button>
      </div>

      <nav class="sidebar-nav">
        <a href="/admin/dashboard.html" data-page="admin-dashboard" data-role="Admin" class="text-decoration-none"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a href="/admin/tests.html" data-page="admin-tests" data-role="Admin" class="text-decoration-none"><i class="bi bi-journal-richtext"></i> Tests</a>
        <a href="/admin/users.html" data-page="admin-users" data-role="Admin" class="text-decoration-none"><i class="bi bi-people"></i> Users</a>
        <a href="/admin/results.html" data-page="admin-results" data-role="Admin" class="text-decoration-none"><i class="bi bi-bar-chart"></i> Results</a>
      </nav>

      <div class="sidebar-divider"></div>

      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-avatar js-user-avatar">U</div>
          <div class="sidebar-user-info">
            <div class="sidebar-user-name js-user-name">&nbsp;</div>
            <div class="sidebar-user-role js-user-role"></div>
          </div>
        </div>
        <div class="sidebar-actions">
          <a href="/profile.html" class="btn btn-ghost btn-sm w-100"><i class="bi bi-person-gear"></i> Profile</a>
          <button type="button" class="btn btn-ghost btn-sm w-100 text-rose-500 js-logout-btn"><i class="bi bi-box-arrow-right"></i> Sign Out</button>
        </div>
      </div>
    </aside>

    <div class="main-wrapper">
      <div class="topbar">
        <button class="topbar-toggle" id="sidebarToggle" aria-label="Toggle sidebar"><i class="bi bi-list"></i></button>
        <span class="topbar-brand">WebTestPortal</span>
        <div class="topbar-user">
          <div class="sidebar-avatar js-user-avatar" style="width:32px;height:32px;font-size:0.75rem;">U</div>
        </div>
      </div>
      <main class="main" id="mainContent">

        <div class="fade-in-el" style="max-width: 720px;margin: 0 auto;">
          <div class="page-header">
            <h1 class="page-title">My Profile</h1>
            <p class="page-subtitle">Manage your account information and security settings.</p>
          </div>

          <div class="profile-section mb-4">
            <div class="section-header">
              <i class="bi bi-person text-brand fs-5"></i>
              <h5>Profile Information</h5>
            </div>
            <div class="section-body">
              <div class="alert alert-danger d-none" id="profileAlert"></div>
              <form id="profileForm">
                <div class="mb-3">
                  <label class="form-label" for="pUsername">Username</label>
                  <input class="form-control" id="pUsername" required minlength="3">
                </div>
                <div class="mb-3">
                  <label class="form-label" for="pFullName">Full Name</label>
                  <input class="form-control" id="pFullName" required>
                </div>
                <div class="mb-3">
                  <label class="form-label" for="pEmail">Email</label>
                  <input class="form-control" id="pEmail" type="email" required>
                </div>
                <button type="submit" class="btn btn-brand">Save Changes</button>
              </form>
            </div>
          </div>

          <div class="profile-section">
            <div class="section-header">
              <i class="bi bi-shield-lock text-brand fs-5"></i>
              <h5>Change Password</h5>
            </div>
            <div class="section-body">
              <div class="alert alert-danger d-none" id="passwordAlert"></div>
              <form id="passwordForm">
                <div class="floating-group">
                  <input name="CurrentPassword" type="password" class="form-control" id="CurrentPassword" placeholder="Current Password" autocomplete="current-password" required>
                  <label for="CurrentPassword">Current Password</label>
                  <button type="button" class="password-toggle" tabindex="-1" aria-label="Toggle password visibility"><i class="bi bi-eye"></i></button>
                </div>
                <div class="floating-group">
                  <input name="NewPassword" type="password" class="form-control" id="NewPassword" placeholder="New Password" autocomplete="new-password" minlength="6" required>
                  <label for="NewPassword">New Password</label>
                  <button type="button" class="password-toggle" tabindex="-1" aria-label="Toggle password visibility"><i class="bi bi-eye"></i></button>
                </div>
                <div class="floating-group">
                  <input name="ConfirmPassword" type="password" class="form-control" id="ConfirmPassword" placeholder="Confirm New Password" autocomplete="new-password" minlength="6" required>
                  <label for="ConfirmPassword">Confirm New Password</label>
                  <button type="button" class="password-toggle" tabindex="-1" aria-label="Toggle password visibility"><i class="bi bi-eye"></i></button>
                </div>
                <button type="submit" class="btn btn-outline-brand mt-2">Update Password</button>
              </form>
            </div>
          </div>
        </div>

      </main>
      <footer class="app-footer d-none d-sm-block">
        <div class="container-fluid">
          <div class="row align-items-center justify-content-between">
            <div class="col-12 col-md-6 text-center text-md-start mb-1 mb-md-0">&copy; 2026 WebTestPortal. All rights reserved.</div>
          </div>
        </div>
      </footer>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/search.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/profile.js"></script>
  <div class="toast-container" id="toastContainer"></div>
</body>
</html>
