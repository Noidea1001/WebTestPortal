<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - WebTestPortal</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/css/site.css">
</head>
<body>
  <main class="main auth-main">
    <div class="auth-card-premium fade-in-el">
      <div class="card-body">
        <div class="auth-brand">
          <div class="brand-icon"><i class="bi bi-mortarboard-fill"></i></div>
          <h2>WebTestPortal</h2>
          <p>Sign in to your account or create a new one</p>
        </div>

        <div class="auth-validation d-none" id="alertBox" role="alert"></div>
        <div class="auth-validation d-none" id="successBox" role="status" style="background:#f0fdf4;color:#166534;border-color:rgba(34,197,94,0.25);"></div>

        <div class="auth-tabs" role="tablist">
          <button class="auth-tab active" id="login-tab" data-bs-toggle="tab" data-bs-target="#loginPanel" type="button" role="tab">Sign In</button>
          <button class="auth-tab" id="register-tab" data-bs-toggle="tab" data-bs-target="#registerPanel" type="button" role="tab">Create Account</button>
        </div>

        <div class="tab-content">
          <div class="tab-pane fade show active" id="loginPanel" role="tabpanel">
            <form id="loginForm" novalidate>
              <div class="floating-group">
                <input type="text" class="form-control" id="loginUsername" placeholder="Username or Email" required autocomplete="username">
                <label for="loginUsername">Username or Email</label>
              </div>
              <div class="floating-group">
                <input type="password" class="form-control" id="loginPassword" placeholder="Password" required autocomplete="current-password">
                <label for="loginPassword">Password</label>
                <button type="button" class="password-toggle" tabindex="-1" aria-label="Toggle password visibility"><i class="bi bi-eye"></i></button>
              </div>
              <button type="submit" class="auth-submit" id="loginSubmit">
                <span class="btn-text">Sign In</span>
              </button>
            </form>
          </div>

          <div class="tab-pane fade" id="registerPanel" role="tabpanel">
            <form id="registerForm" novalidate>
              <div class="floating-group">
                <input type="text" class="form-control" id="registerUsername" placeholder="Username" required autocomplete="username" minlength="3">
                <label for="registerUsername">Username</label>
              </div>
              <div class="floating-group">
                <input type="text" class="form-control" id="registerFullName" placeholder="Full Name" required autocomplete="name">
                <label for="registerFullName">Full Name</label>
              </div>
              <div class="floating-group">
                <input type="email" class="form-control" id="registerEmail" placeholder="Email" required autocomplete="email">
                <label for="registerEmail">Email</label>
              </div>
              <div class="floating-group">
                <input type="password" class="form-control" id="registerPassword" placeholder="Password" required autocomplete="new-password" minlength="6">
                <label for="registerPassword">Password</label>
                <button type="button" class="password-toggle" tabindex="-1" aria-label="Toggle password visibility"><i class="bi bi-eye"></i></button>
              </div>
              <button type="submit" class="auth-submit" id="registerSubmit">
                <span class="btn-text">Create Account</span>
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
