<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Available Tests - WebTestPortal</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/css/site.css">
  
</head>
<body data-active-page="student-tests" data-require-role="">
  <div class="shell">
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <a href="/student/dashboard.html" class="sidebar-brand">
          <span class="sidebar-brand-icon"><i class="bi bi-mortarboard-fill"></i></span>
          <span class="sidebar-brand-text">WebTestPortal</span>
        </a>
        <button class="sidebar-close d-lg-none" id="sidebarClose" aria-label="Close sidebar"><i class="bi bi-x-lg"></i></button>
      </div>

      <nav class="sidebar-nav">
        
        <a href="/student/dashboard.html" data-page="student-dashboard" data-role="Student" class="text-decoration-none"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a href="/student/available-tests.html" data-page="student-tests" data-role="Student" class="text-decoration-none"><i class="bi bi-journal-check"></i> Available Tests</a>
        <a href="/student/history.html" data-page="student-history" data-role="Student" class="text-decoration-none"><i class="bi bi-clock-history"></i> History</a>
      </nav>

      <div class="sidebar-divider"></div>

      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-avatar js-user-avatar">U</div>
          <div class="sidebar-user-info">
            <div class="sidebar-user-name js-user-name">&nbsp;</div>
            <div class="sidebar-user-role js-user-role"></div>
          </div>
        </div>
        <div class="sidebar-actions">
          <a href="/profile.html" class="btn btn-ghost btn-sm w-100"><i class="bi bi-person-gear"></i> Profile</a>
          <button type="button" class="btn btn-ghost btn-sm w-100 text-rose-500 js-logout-btn"><i class="bi bi-box-arrow-right"></i> Sign Out</button>
        </div>
      </div>
    </aside>

    <div class="main-wrapper">
      <div class="topbar">
        <button class="topbar-toggle" id="sidebarToggle" aria-label="Toggle sidebar"><i class="bi bi-list"></i></button>
        <span class="topbar-brand">WebTestPortal</span>
        <div class="topbar-user">
          <div class="sidebar-avatar js-user-avatar" style="width:32px;height:32px;font-size:0.75rem;">U</div>
        </div>
      </div>
      <main class="main" id="mainContent">

        <div class="fade-in-el">
          <div class="page-header mb-3">
            <h1 class="page-title">Available Tests</h1>
            <p class="page-subtitle">Browse and start any test that's currently open to you.</p>
          </div>
          <div class="alert alert-danger d-none" id="alertBox"></div>

          <div class="card p-4">
            <div class="empty-state d-none" id="emptyTests">
              <div class="empty-icon"><i class="bi bi-emoji-smile"></i></div>
              <h5 class="empty-title">All Caught Up!</h5>
              <p class="empty-desc">There are no new published tests available for you right now. Check back later!</p>
            </div>
            <div class="row g-3" id="testList"></div>
          </div>
        </div>

      </main>
      <footer class="app-footer d-none d-sm-block">
        <div class="container-fluid">
          <div class="row align-items-center justify-content-between">
            <div class="col-12 col-md-6 text-center text-md-start mb-1 mb-md-0">&copy; 2026 WebTestPortal. All rights reserved.</div>
          </div>
        </div>
      </footer>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/search.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/available-tests.js"></script>
  <div class="toast-container" id="toastContainer"></div>
</body>
</html>
